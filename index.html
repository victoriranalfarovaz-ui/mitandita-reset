<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MiTandita | Cambiar contraseña</title>

    <script type="module">
      import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

      const SUPABASE_URL = "https://ycrvtgqwxdpsfcbfguto.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InljcnZ0Z3F3eGRwc2ZjYmZndXRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4NDU5NjUsImV4cCI6MjA4NjQyMTk2NX0.sMZuKwbz8G0bBXIBIhARnCN_3lwZzMTxIWNgEeIJFbc";

      const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      function showStatus(message, type = "info") {
        const statusBox = document.getElementById("status");
        statusBox.textContent = message;
        statusBox.className = "status " + type;
        statusBox.style.display = "block";
      }

      function showForm() {
        document.getElementById("reset-form").style.display = "block";
      }

      function hideForm() {
        document.getElementById("reset-form").style.display = "none";
      }

      function showOpenAppButton() {
        document.getElementById("openAppBtn").style.display = "block";
      }

      function getHashParams() {
        const hash = window.location.hash.startsWith("#")
          ? window.location.hash.slice(1)
          : "";
        return new URLSearchParams(hash);
      }

      function getQueryParams() {
        return new URLSearchParams(window.location.search);
      }

      async function bootstrapRecoverySession() {
        try {
          const hashParams = getHashParams();
          const queryParams = getQueryParams();

          const hashAccessToken = hashParams.get("access_token");
          const hashRefreshToken = hashParams.get("refresh_token");
          const hashType = hashParams.get("type");

          const code = queryParams.get("code");
          const tokenHash = queryParams.get("token_hash");
          const queryType = queryParams.get("type");
          const error = queryParams.get("error");
          const errorDescription = queryParams.get("error_description");

          if (error) {
            showStatus(errorDescription || "El enlace no es válido o ya expiró.", "error");
            hideForm();
            return;
          }

          // Caso 1: vienen access/refresh token en hash
          if (hashType === "recovery" && hashAccessToken && hashRefreshToken) {
            const { error: sessionError } = await supabase.auth.setSession({
              access_token: hashAccessToken,
              refresh_token: hashRefreshToken,
            });

            if (sessionError) {
              showStatus("No se pudo validar el enlace. Solicita uno nuevo.", "error");
              hideForm();
              return;
            }

            showStatus("Escribe tu nueva contraseña.", "success");
            showForm();
            return;
          }

          // Caso 2: viene code en query (muy común)
          if (code) {
            const { error: exchangeError } = await supabase.auth.exchangeCodeForSession(code);

            if (exchangeError) {
              showStatus("No se pudo validar el enlace. Solicita uno nuevo.", "error");
              hideForm();
              return;
            }

            showStatus("Escribe tu nueva contraseña.", "success");
            showForm();
            return;
          }

          // Caso 3: viene token_hash + type=recovery
          if (queryType === "recovery" && tokenHash) {
            const { error: verifyError } = await supabase.auth.verifyOtp({
              token_hash: tokenHash,
              type: "recovery",
            });

            if (verifyError) {
              showStatus("No se pudo validar el enlace. Solicita uno nuevo.", "error");
              hideForm();
              return;
            }

            showStatus("Escribe tu nueva contraseña.", "success");
            showForm();
            return;
          }

          showStatus("Enlace inválido.", "error");
          hideForm();
        } catch (e) {
          showStatus("No se pudo procesar el enlace.", "error");
          hideForm();
        }
      }

      async function savePassword(e) {
        e.preventDefault();

        const passwordInput = document.getElementById("password");
        const confirmInput = document.getElementById("confirmPassword");
        const submitBtn = document.getElementById("submitBtn");

        const password = passwordInput.value.trim();
        const confirmPassword = confirmInput.value.trim();

        if (!password || !confirmPassword) {
          showStatus("Completa ambos campos.", "error");
          return;
        }

        if (password.length < 6) {
          showStatus("La contraseña debe tener al menos 6 caracteres.", "error");
          return;
        }

        if (password !== confirmPassword) {
          showStatus("Las contraseñas no coinciden.", "error");
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "Guardando...";

        const { error } = await supabase.auth.updateUser({ password });

        if (error) {
          showStatus(error.message || "No se pudo cambiar la contraseña.", "error");
          submitBtn.disabled = false;
          submitBtn.textContent = "Guardar contraseña";
          return;
        }

        showStatus("Contraseña actualizada correctamente 🎉", "success");
        document.getElementById("reset-form").reset();
        document.getElementById("reset-form").style.display = "none";
        showOpenAppButton();

        await supabase.auth.signOut();
      }

      window.openApp = function () {
        window.location.href = "mitandita://login";
      };

      window.addEventListener("DOMContentLoaded", async () => {
        document.getElementById("reset-form").addEventListener("submit", savePassword);
        await bootstrapRecoverySession();
      });
    </script>

    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: #ff7a00;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Arial, sans-serif;
        padding: 20px;
      }

      .card {
        width: 100%;
        max-width: 420px;
        background: white;
        border-radius: 20px;
        padding: 28px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      }

      .logo {
        width: 110px;
        height: 110px;
        object-fit: contain;
        display: block;
        margin: 0 auto 14px;
      }

      h1 {
        text-align: center;
        margin: 0 0 10px;
      }

      p.sub {
        text-align: center;
        color: #666;
        margin: 0 0 16px;
      }

      .status {
        display: none;
        padding: 10px;
        border-radius: 10px;
        margin-bottom: 12px;
        font-size: 14px;
      }

      .success {
        background: #ecfdf3;
        color: #166534;
      }

      .error {
        background: #fef2f2;
        color: #991b1b;
      }

      .info {
        background: #f3f4f6;
        color: #374151;
      }

      input {
        width: 100%;
        padding: 14px;
        margin-bottom: 12px;
        border-radius: 12px;
        border: 1px solid #eee;
        background: #fafafa;
        box-sizing: border-box;
      }

      button {
        width: 100%;
        padding: 14px;
        border-radius: 12px;
        border: none;
        background: #ff7a00;
        color: white;
        font-weight: bold;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.6;
      }

      .footer {
        text-align: center;
        margin-top: 12px;
        color: #666;
        font-size: 14px;
      }

      .open-app {
        display: none;
        margin-top: 12px;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <img src="./logo.png" alt="MiTandita" class="logo" />

      <h1>Cambiar contraseña</h1>
      <p class="sub">MiTandita</p>

      <div id="status" class="status"></div>

      <form id="reset-form" style="display: none;">
        <input id="password" type="password" placeholder="Nueva contraseña" />
        <input id="confirmPassword" type="password" placeholder="Confirmar contraseña" />
        <button id="submitBtn" type="submit">Guardar contraseña</button>
      </form>

      <button id="openAppBtn" class="open-app" onclick="openApp()">
        Abrir app
      </button>

      <div class="footer">
        Después vuelve a la app e inicia sesión.
      </div>
    </div>
  </body>
</html>
