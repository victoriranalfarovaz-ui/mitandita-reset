<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MiTandita | Cambiar contraseña</title>

    <script type="module">
      import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

      const SUPABASE_URL = "https://ycrvtgqwxdpsfcbfguto.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InljcnZ0Z3F3eGRwc2ZjYmZndXRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4NDU5NjUsImV4cCI6MjA4NjQyMTk2NX0.sMZuKwbz8G0bBXIBIhARnCN_3lwZzMTxIWNgEeIJFbc"; 

      const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      function showStatus(message, type = "info") {
        const statusBox = document.getElementById("status");
        statusBox.textContent = message;
        statusBox.className = "status " + type;
        statusBox.style.display = "block";
      }

      function showForm() {
        document.getElementById("reset-form").style.display = "block";
      }

      function hideForm() {
        document.getElementById("reset-form").style.display = "none";
      }

      function showOpenAppButton() {
        document.getElementById("openAppBtn").style.display = "block";
      }

      function getHashParams() {
        const hash = window.location.hash.startsWith("#")
          ? window.location.hash.slice(1)
          : "";
        return new URLSearchParams(hash);
      }

      function getQueryParams() {
        return new URLSearchParams(window.location.search);
      }

      async function bootstrapRecoverySession() {
        try {
          const hashParams = getHashParams();
          const queryParams = getQueryParams();

          const access_token = hashParams.get("access_token");
          const refresh_token = hashParams.get("refresh_token");
          const hashType = hashParams.get("type");

          const code = queryParams.get("code");
          const token_hash = queryParams.get("token_hash");
          const queryType = queryParams.get("type");

          // ✅ Caso 1: tokens directos
          if (hashType === "recovery" && access_token && refresh_token) {
            const { error } = await supabase.auth.setSession({
              access_token,
              refresh_token,
            });

            if (error) throw error;

            showStatus("Escribe tu nueva contraseña.", "success");
            showForm();
            return;
          }

          // ✅ Caso 2: PKCE (code)
          if (code) {
            window.history.replaceState({}, document.title, window.location.pathname);

            const { error } = await supabase.auth.exchangeCodeForSession(code);

            if (error) throw error;

            showStatus("Escribe tu nueva contraseña.", "success");
            showForm();
            return;
          }

          // ✅ Caso 3: token_hash
          if (queryType === "recovery" && token_hash) {
            const { error } = await supabase.auth.verifyOtp({
              token_hash,
              type: "recovery",
            });

            if (error) throw error;

            showStatus("Escribe tu nueva contraseña.", "success");
            showForm();
            return;
          }

          throw new Error("Enlace inválido");
        } catch (err) {
          console.log(err);
          showStatus("No se pudo validar el enlace. Solicita uno nuevo.", "error");
          hideForm();
        }
      }

      async function savePassword(e) {
        e.preventDefault();

        const password = document.getElementById("password").value.trim();
        const confirmPassword = document.getElementById("confirmPassword").value.trim();
        const btn = document.getElementById("submitBtn");

        if (!password || !confirmPassword) {
          showStatus("Completa ambos campos.", "error");
          return;
        }

        if (password.length < 6) {
          showStatus("Mínimo 6 caracteres.", "error");
          return;
        }

        if (password !== confirmPassword) {
          showStatus("Las contraseñas no coinciden.", "error");
          return;
        }

        btn.disabled = true;
        btn.textContent = "Guardando...";

        const { error } = await supabase.auth.updateUser({ password });

        if (error) {
          showStatus(error.message, "error");
          btn.disabled = false;
          btn.textContent = "Guardar contraseña";
          return;
        }

        showStatus("Contraseña actualizada 🎉", "success");
        document.getElementById("reset-form").reset();
        document.getElementById("reset-form").style.display = "none";

        showOpenAppButton();
        await supabase.auth.signOut();
      }

      window.openApp = function () {
        window.location.href = "mitandita://login";
      };

      window.addEventListener("DOMContentLoaded", async () => {
        document.getElementById("reset-form").addEventListener("submit", savePassword);
        await bootstrapRecoverySession();
      });
    </script>

    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: #ff7a00;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Arial, sans-serif;
        padding: 20px;
      }

      .card {
        width: 100%;
        max-width: 420px;
        background: white;
        border-radius: 20px;
        padding: 28px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      }

      /* 🔥 LOGO MÁS GRANDE */
      .logo {
        width: 160px;
        height: 160px;
        object-fit: contain;
        display: block;
        margin: 0 auto 10px;
      }

      h1 {
        text-align: center;
        margin: 10px 0;
      }

      p.sub {
        text-align: center;
        color: #666;
        margin-bottom: 16px;
      }

      .status {
        display: none;
        padding: 10px;
        border-radius: 10px;
        margin-bottom: 12px;
      }

      .success {
        background: #ecfdf3;
        color: #166534;
      }

      .error {
        background: #fef2f2;
        color: #991b1b;
      }

      input {
        width: 100%;
        padding: 14px;
        margin-bottom: 12px;
        border-radius: 12px;
        border: 1px solid #eee;
        background: #fafafa;
      }

      button {
        width: 100%;
        padding: 14px;
        border-radius: 12px;
        border: none;
        background: #ff7a00;
        color: white;
        font-weight: bold;
      }

      .footer {
        text-align: center;
        margin-top: 12px;
        color: #666;
      }

      .open-app {
        display: none;
        margin-top: 12px;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <img src="./icon.png" class="logo" />

      <h1>Cambiar contraseña</h1>
      <p class="sub">MiTandita</p>

      <div id="status" class="status"></div>

      <form id="reset-form" style="display:none;">
        <input id="password" type="password" placeholder="Nueva contraseña" />
        <input id="confirmPassword" type="password" placeholder="Confirmar contraseña" />
        <button id="submitBtn">Guardar contraseña</button>
      </form>

      <button id="openAppBtn" class="open-app" onclick="openApp()">
        Abrir app
      </button>

      <div class="footer">
        Después vuelve a la app e inicia sesión.
      </div>
    </div>
  </body>
</html>
